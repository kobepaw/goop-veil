; goop-veil detector firmware
; Platform: ESP32-S3
; Framework: ESP-IDF (FreeRTOS)
;
; Passive CSI (Channel State Information) capture for WiFi sensing
; detection. This firmware is receive-only — it does not transmit.
;
; SPDX-License-Identifier: Apache-2.0
; Copyright 2026 goop-veil contributors

[env:esp32s3]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
board_build.flash_mode = dio
board_build.flash_size = 4MB

; ESP-IDF sdkconfig overrides
build_flags =
    -DCONFIG_ESP32S3_DEFAULT_CPU_FREQ_240=1
    -DCONFIG_FREERTOS_HZ=1000
    -DCONFIG_ESP_WIFI_CSI_ENABLED=1
    -DCONFIG_ESP_WIFI_PROMISCUOUS_MODE=1
    -DCSI_BUFFER_DEPTH=128
    -DCSI_REPORT_INTERVAL_MS=1000

; Upload settings
upload_speed = 921600
upload_port = /dev/ttyUSB0

; Debug
debug_tool = esp-builtin
debug_init_break = tbreak app_main

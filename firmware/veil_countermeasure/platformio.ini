; goop-veil countermeasure firmware
; Platform: ESP32-S3
; Framework: ESP-IDF (FreeRTOS)
;
; SPDX-License-Identifier: Apache-2.0
; Copyright 2026 goop-veil contributors

[env:esp32s3]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
board_build.flash_mode = dio
board_build.flash_size = 16MB
board_build.partitions = partitions.csv

; SPI flash partition for audit log (last 2MB)
board_build.extra_flags =
    -DAUDIT_PARTITION_LABEL=\"audit\"

; ESP-IDF sdkconfig overrides
build_flags =
    -DCONFIG_ESP_WIFI_ENABLE_WPA3_SAE=1
    -DCONFIG_ESP_WIFI_SOFTAP_SAE_SUPPORT=1
    -DCONFIG_ESP32S3_DEFAULT_CPU_FREQ_240=1
    -DCONFIG_FREERTOS_HZ=1000
    -DCONFIG_ESP_TASK_WDT_TIMEOUT_S=10
    -DCONFIG_ESP_WIFI_CSI_ENABLED=1
    -DCONFIG_ESP_WIFI_FTM_ENABLE=1
    -DMAX_TX_POWER_DBM=20
    -DHARDWARE_PA_CUTOFF_DBM=21
    -DCHANNEL_MIN=1
    -DCHANNEL_MAX=11
    -DCONFIG_PARTITION_TABLE_CUSTOM=1

; Component dependencies
lib_deps =
    espressif/esp_modem@^1.0.0
    espressif/cJSON@^1.7.15

; Upload settings
upload_speed = 921600
upload_port = /dev/ttyUSB0

; Debug
debug_tool = esp-builtin
debug_init_break = tbreak app_main

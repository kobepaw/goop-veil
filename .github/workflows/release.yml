name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  linux-x86_64:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --features extension-module
          target: x86_64-unknown-linux-gnu
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: dist/*.whl

  linux-aarch64:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --features extension-module
          target: aarch64-unknown-linux-gnu
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-aarch64
          path: dist/*.whl

  macos-x86_64:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-13
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --features extension-module
          target: x86_64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-x86_64
          path: dist/*.whl

  macos-arm64:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --features extension-module
          target: aarch64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-arm64
          path: dist/*.whl

  smoke-test-linux-wheel:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux-x86_64]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/download-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: dist

      - name: Smoke-test built wheel
        run: |
          python -m pip install dist/*.whl
          python -c "import goop_veil; print(goop_veil.__version__)"

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux-x86_64, linux-aarch64, macos-x86_64, macos-arm64, smoke-test-linux-wheel]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl

      - name: Publish to PyPI
        if: ${{ env.MATURIN_PYPI_TOKEN != '' }}
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive dist/*.whl
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

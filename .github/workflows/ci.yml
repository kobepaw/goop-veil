name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  rust-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Run Rust tests
        run: cargo test

  python-test:
    needs: rust-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Create venv and install maturin
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin

      - name: Build extension
        run: |
          source .venv/bin/activate
          maturin develop --features extension-module

      - name: Install test dependencies
        run: |
          source .venv/bin/activate
          pip install .[dev]

      - name: Run Python tests
        if: matrix.python-version != '3.12'
        run: |
          source .venv/bin/activate
          pytest tests/ -v --tb=short

      - name: Run Python tests with coverage
        if: matrix.python-version == '3.12'
        run: |
          source .venv/bin/activate
          PYTHONPATH=python pytest tests/ -v --tb=short --cov=goop_veil --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-python-${{ matrix.python-version }}
          path: coverage.xml

  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Create venv and install maturin
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin

      - name: Build extension
        run: |
          source .venv/bin/activate
          maturin develop --features extension-module

      - name: Install lint dependencies
        run: |
          source .venv/bin/activate
          pip install .[dev]

      - name: Run ruff (staged surface)
        run: |
          source .venv/bin/activate
          ruff check python/goop_veil/mitigation/legal

  mypy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Create venv and install maturin
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin

      - name: Build extension
        run: |
          source .venv/bin/activate
          maturin develop --features extension-module

      - name: Install type-check dependencies
        run: |
          source .venv/bin/activate
          pip install .[all]

      - name: Run mypy (staged, report-only)
        run: |
          source .venv/bin/activate
          mypy --ignore-missing-imports python/goop_veil/mitigation/legal

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Create venv and install maturin
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin

      - name: Build extension
        run: |
          source .venv/bin/activate
          maturin develop --features extension-module

      - name: Install audit dependencies
        run: |
          source .venv/bin/activate
          pip install --upgrade pip
          pip install .[all,dev]

      - name: Audit Python dependencies (staged, report-only)
        run: |
          source .venv/bin/activate
          pip-audit --progress-spinner off

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run lightweight secret scan
        run: python scripts/check_secrets.py
